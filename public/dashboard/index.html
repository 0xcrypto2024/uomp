<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UOMP Portfolio Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  :root { --bg:#0A0A0A; --card:#111; --border:#1F2937; --text:#E5E7EB; --mid:#9CA3AF; --dim:#6B7280; --green:#34D399; --red:#F87171; --blue:#3B82F6; --purple:#8B5CF6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
  .container { max-width:1200px; margin:0 auto; padding:2rem 1.5rem; }
  header { margin-bottom:2rem; }
  h1 { font-size:1.5rem; color:#fff; display:flex; align-items:center; gap:.5rem; margin-bottom:1rem; }
  .logo { width:28px; height:28px; }
  .modes { display:flex; gap:.75rem; flex-wrap:wrap; align-items:flex-start; }
  .mode-card { flex:1; min-width:300px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.25rem; }
  .mode-title { font-size:.85rem; font-weight:600; color:var(--mid); margin-bottom:.75rem; text-transform:uppercase; letter-spacing:.5px; }
  .mode-card input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:.5rem .75rem; border-radius:6px; font-size:.85rem; margin-bottom:.5rem; }
  .mode-card input::placeholder { color:var(--dim); }
  .mode-card button { width:100%; padding:.6rem; border-radius:6px; font-size:.85rem; font-weight:600; cursor:pointer; border:none; color:#fff; }
  .btn-gateway { background:var(--blue); }
  .btn-wallet { background:var(--purple); }
  .btn-wallet-starknet { background:#EC796B; }
  button:hover { opacity:.9; }
  button:disabled { background:#374151!important; cursor:not-allowed; }
  .status { font-size:.8rem; padding:.25rem .6rem; border-radius:4px; display:inline-block; margin-top:.5rem; }
  .status-ok { background:#064E3B; color:var(--green); }
  .status-err { background:#7F1D1D; color:var(--red); }
  .user-info { display:flex; align-items:center; gap:.75rem; margin-bottom:2rem; padding:.75rem 1rem; background:var(--card); border:1px solid var(--border); border-radius:8px; font-size:.85rem; }
  .user-info .addr { color:var(--purple); font-family:monospace; }
  .user-info button { padding:.3rem .75rem; font-size:.75rem; background:var(--card); border:1px solid var(--border); color:var(--mid); border-radius:4px; cursor:pointer; }

  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:.75rem; margin-bottom:2rem; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.25rem; }
  .card-label { font-size:.8rem; color:var(--mid); margin-bottom:.3rem; }
  .card-value { font-size:1.5rem; font-weight:700; }
  .card-sub { font-size:.8rem; color:var(--dim); margin-top:.2rem; }
  .pos { color:var(--green); } .neg { color:var(--red); }

  h2 { font-size:1.1rem; margin:2rem 0 1rem; color:#fff; }
  table { width:100%; border-collapse:collapse; font-size:.83rem; }
  th,td { padding:.5rem .6rem; text-align:right; border-bottom:1px solid var(--border); }
  th { background:var(--card); color:var(--mid); font-weight:600; }
  th:first-child,td:first-child { text-align:left; }
  th:nth-child(2),td:nth-child(2) { text-align:left; }

  .bar-wrap { display:flex; align-items:center; gap:.5rem; margin:.35rem 0; }
  .bar-label { width:110px; font-size:.8rem; color:var(--mid); text-align:right; flex-shrink:0; }
  .bar-track { flex:1; background:var(--border); height:8px; border-radius:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; transition:width .3s; }
  .bar-pct { width:48px; font-size:.8rem; color:var(--dim); }
  .signal { display:flex; align-items:center; gap:.5rem; padding:.35rem 0; border-bottom:1px solid var(--border); font-size:.83rem; }

  .footer { margin-top:3rem; padding-top:1rem; border-top:1px solid var(--border); color:var(--dim); font-size:.75rem; text-align:center; }
  .footer a { color:var(--mid); }
  @media(max-width:640px) { .modes { flex-direction:column; } .container { padding:1rem; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>
      <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      UOMP Portfolio
    </h1>
    <div class="modes">
      <!-- Gateway Mode -->
      <div class="mode-card" id="gatewayCard">
        <div class="mode-title">Gateway Mode · 需要运行 uomp gateway start</div>
        <input id="gwUrl" placeholder="Gateway URL (https://xxx.trycloudflare.com)">
        <input id="gwToken" placeholder="Capability Token (eyJhbG...)" type="password">
        <button class="btn-gateway" onclick="connectGateway()">Connect via Gateway</button>
        <div id="gwStatus"></div>
      </div>
      <!-- Direct Mode (No Gateway) -->
      <div class="mode-card" id="directCard">
        <div class="mode-title">Direct Mode · 无需Gateway</div>
        <button class="btn-wallet" onclick="connectWallet('ethereum')">🔑 Connect MetaMask</button>
        <button class="btn-wallet-starknet" onclick="connectWallet('starknet')" style="margin-top:.5rem">🦁 Connect Argent X (Starknet)</button>
        <div style="font-size:.75rem;color:var(--dim);margin-top:.5rem">钱包签名 → 派生密钥 → 加密存储</div>
        <div id="directStatus"></div>
      </div>
    </div>
    <div id="userInfo" class="user-info" style="display:none"></div>
  </header>

  <div class="grid" id="summary"></div>
  <div id="holdings"></div>
  <div id="sectors" style="display:none"></div>
  <div id="signals" style="display:none"></div>

  <div class="footer">
    Powered by <a href="https://www.uomp.org">UOMP</a> · Data stays on your device
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// Gateway Client
// ═══════════════════════════════════════════════════════════════
class GatewayClient {
  constructor(token, url) { this.token=token; this.base=url.replace(/\/$/,''); }
  async get(path) {
    const r = await fetch(`${this.base}${path}`,{
      headers:{Authorization:`Bearer ${this.token}`,Accept:'application/json','X-UOMP-Agent-Id':'dashboard'}
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`)}
    return r.json();
  }
  async getByTag(t){const d=await this.get(`/v1/memory?tag=${encodeURIComponent(t)}`);return d.items||[];}
  async health(){return this.get('/v1/health');}
}

// ═══════════════════════════════════════════════════════════════
// Direct Mode — Wallet Auth + Encrypted localStorage
// ═══════════════════════════════════════════════════════════════
const STORE_PREFIX = 'uomp_enc_';

// HKDF: derive a 256-bit key from signature + chain + address
async function deriveMasterKey(signature, address, chain) {
  const enc = new TextEncoder();
  const sigBytes = enc.encode(signature).slice(0, 64);
  const addrBytes = enc.encode(address.toLowerCase());
  const ikm = new Uint8Array([...sigBytes, ...addrBytes]).slice(0, 64);
  const key = await crypto.subtle.importKey('raw', ikm, {name:'HKDF'}, false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'HKDF', hash:'SHA-256', salt:enc.encode('uomp-store-v1'), info:enc.encode(`${chain}:${address}`)},
    key, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
  );
}

async function encrypt(cryptoKey, plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv}, cryptoKey, new TextEncoder().encode(plaintext));
  return {iv:Array.from(iv), data:Array.from(new Uint8Array(ct))};
}

async function decrypt(cryptoKey, enc) {
  const iv = new Uint8Array(enc.iv);
  const data = new Uint8Array(enc.data);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv}, cryptoKey, data);
  return new TextDecoder().decode(pt);
}

function storeGet(userId) {
  try { const d=localStorage.getItem(STORE_PREFIX+userId); return d?JSON.parse(d):null; }
  catch { return null; }
}
function storeSet(userId, data) { localStorage.setItem(STORE_PREFIX+userId, JSON.stringify(data)); }
function storeDel(userId) { localStorage.removeItem(STORE_PREFIX+userId); }

// ═══════════════════════════════════════════════════════════════
// Wallet Connection
// ═══════════════════════════════════════════════════════════════
let currentCryptoKey = null;
let currentUserId = null;

async function connectWallet(chain) {
  const status = chain==='ethereum'?document.getElementById('gwStatus'):document.getElementById('directStatus');

  try {
    // Step 1: connect wallet
    status.innerHTML = '<span class="status status-ok">Requesting wallet...</span>';
    let address, signature;

    if (chain === 'ethereum') {
      if (!window.ethereum) throw new Error('MetaMask not detected. Install MetaMask extension.');
      const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
      address = accounts[0];
      signature = await window.ethereum.request({method:'personal_sign', params:['UOMP Store v1', address]});
    } else if (chain === 'starknet') {
      if (!window.starknet) throw new Error('Argent X not detected. Install Argent X extension.');
      await window.starknet.enable();
      address = window.starknet.selectedAddress;
      if (!address) throw new Error('No Starknet account selected');
      // Starknet sign message
      const typedData = {
        domain:{name:'UOMP Store',version:'1',chainId:'SN_MAIN'},
        types:{StarkNetDomain:[{name:'name',type:'felt'},{name:'version',type:'felt'},{name:'chainId',type:'felt'}],Message:[{name:'message',type:'felt'}]},
        primaryType:'Message', message:{message:'UOMP Store v1'}
      };
      const result = await window.starknet.account.signMessage(typedData);
      signature = Array.isArray(result) ? result.join(',') : String(result);
    } else {
      throw new Error('Unknown chain');
    }

    // Step 2: derive key
    status.innerHTML = '<span class="status status-ok">Deriving encryption key...</span>';
    currentCryptoKey = await deriveMasterKey(signature, address, chain);
    currentUserId = `${chain}:${address.toLowerCase()}`;

    // Step 3: load or initialize data
    let holdings, risk;
    const stored = storeGet(currentUserId);

    if (stored) {
      try {
        const plain = await decrypt(currentCryptoKey, stored);
        const parsed = JSON.parse(plain);
        holdings = parsed.holdings;
        risk = parsed.risk;
        status.innerHTML = '<span class="status status-ok">✓ Data loaded (decrypted in browser)</span>';
      } catch { /* corrupted */ }
    }

    if (!holdings) {
      // Initialize with sample portfolio
      holdings = SAMPLE_HOLDINGS;
      risk = SAMPLE_RISK;
      const encrypted = await encrypt(currentCryptoKey, JSON.stringify({holdings,risk}));
      storeSet(currentUserId, encrypted);
      status.innerHTML = '<span class="status status-ok">✓ Portfolio initialized & encrypted</span>';
    }

    // Update UI
    document.getElementById('gatewayCard').style.display = 'none';
    document.getElementById('directCard').style.display = 'none';
    document.getElementById('userInfo').style.display = 'flex';
    document.getElementById('userInfo').innerHTML = `
      <span style="color:var(--mid)">Identity:</span>
      <span class="addr">${currentUserId.slice(0,30)}...</span>
      <span class="status status-ok">Encrypted in browser</span>
      <button onclick="disconnect()">Disconnect</button>
    `;

    renderDashboard(holdings, risk);
  } catch(e) {
    status.innerHTML = `<span class="status status-err">✗ ${e.message}</span>`;
  }
}

async function disconnect() {
  currentCryptoKey = null; currentUserId = null;
  location.reload();
}

// ═══════════════════════════════════════════════════════════════
// Gateway Mode
// ═══════════════════════════════════════════════════════════════
async function connectGateway() {
  const url = document.getElementById('gwUrl').value.trim();
  const token = document.getElementById('gwToken').value.trim();
  const status = document.getElementById('gwStatus');
  if (!token||!url) { status.innerHTML='<span class="status status-err">Please enter Gateway URL and Token</span>'; return; }

  try {
    const client = new GatewayClient(token, url);
    const h = await client.health();
    status.innerHTML = `<span class="status status-ok">✓ Connected to ${h.audience}</span>`;
    const holdings = await client.getByTag('portfolio:holdings');
    const riskItems = await client.getByTag('profile:risk');

    document.getElementById('directCard').style.display = 'none';
    document.getElementById('userInfo').style.display = 'flex';
    document.getElementById('userInfo').innerHTML = `<span class="status status-ok">Gateway Mode</span><span style="color:var(--dim);font-size:.8rem">${h.audience}</span><button onclick="disconnect()">Disconnect</button>`;

    renderDashboard(holdings, riskItems[0]?.value||{});
  } catch(e) {
    status.innerHTML = `<span class="status status-err">✗ ${e.message}</span>`;
  }
}

// ═══════════════════════════════════════════════════════════════
// Dashboard Rendering
// ═══════════════════════════════════════════════════════════════
const SAMPLE_HOLDINGS = [
  {key:'AAPL',value:{symbol:'AAPL',name:'Apple Inc.',quantity:'100',cost_basis:'150.00',market_value:'22700.00',sector:'Technology'},tags:['portfolio:holdings'],sensitivity:'high'},
  {key:'MSFT',value:{symbol:'MSFT',name:'Microsoft',quantity:'40',cost_basis:'320.00',market_value:'18000.00',sector:'Technology'},tags:['portfolio:holdings'],sensitivity:'high'},
  {key:'GOOGL',value:{symbol:'GOOGL',name:'Alphabet',quantity:'30',cost_basis:'140.00',market_value:'5400.00',sector:'Technology'},tags:['portfolio:holdings'],sensitivity:'high'},
  {key:'NVDA',value:{symbol:'NVDA',name:'NVIDIA',quantity:'30',cost_basis:'300.00',market_value:'13500.00',sector:'Technology'},tags:['portfolio:holdings'],sensitivity:'high'},
  {key:'TSLA',value:{symbol:'TSLA',name:'Tesla',quantity:'50',cost_basis:'200.00',market_value:'12500.00',sector:'Consumer Cyclical'},tags:['portfolio:holdings'],sensitivity:'high'},
  {key:'AMZN',value:{symbol:'AMZN',name:'Amazon',quantity:'25',cost_basis:'170.00',market_value:'5500.00',sector:'Consumer Cyclical'},tags:['portfolio:holdings'],sensitivity:'high'},
  {key:'JPM',value:{symbol:'JPM',name:'JPMorgan',quantity:'60',cost_basis:'155.00',market_value:'12000.00',sector:'Financial'},tags:['portfolio:holdings'],sensitivity:'high'},
  {key:'BAC',value:{symbol:'BAC',name:'Bank of America',quantity:'200',cost_basis:'32.00',market_value:'7400.00',sector:'Financial'},tags:['portfolio:holdings'],sensitivity:'high'},
  {key:'JNJ',value:{symbol:'JNJ',name:'J&J',quantity:'40',cost_basis:'160.00',market_value:'7000.00',sector:'Healthcare'},tags:['portfolio:holdings'],sensitivity:'high'},
  {key:'XOM',value:{symbol:'XOM',name:'Exxon Mobil',quantity:'50',cost_basis:'100.00',market_value:'6200.00',sector:'Energy'},tags:['portfolio:holdings'],sensitivity:'high'},
];
const SAMPLE_RISK = {risk_level:'moderate',max_drawdown:0.20,investment_horizon:'5_years',stop_loss_pct:15,take_profit_pct:50};

const COLORS=['#3B82F6','#8B5CF6','#EC4899','#F59E0B','#10B981','#EF4444','#6366F1','#14B8A6'];

function renderDashboard(holdings, risk) {
  let totalCost=0,totalVal=0; const sectors={},rows=[];
  for(const item of holdings){
    const h=item.value; const qty=parseFloat(h.quantity),cost=parseFloat(h.cost_basis);
    const mkt=parseFloat(h.market_value),price=mkt/qty,costVal=cost*qty,pnl=mkt-costVal,pnlPct=costVal>0?(pnl/costVal)*100:0;
    totalCost+=costVal;totalVal+=mkt;
    const sec=h.sector||'Unknown';sectors[sec]=(sectors[sec]||0)+mkt;
    rows.push({...h,qty,costBasis:cost,price,curVal:mkt,pnl,pnlPct,weight:0,sector:sec});
  }
  for(const r of rows)r.weight=totalVal>0?(r.curVal/totalVal)*100:0;
  const totalPnl=totalVal-totalCost,totalPnlPct=totalCost>0?(totalPnl/totalCost)*100:0;
  const hhi=rows.reduce((s,r)=>s+r.weight*r.weight,0);

  // Signals
  const signals=[],sl=risk?.stop_loss_pct||15,tp=risk?.take_profit_pct||50;
  for(const r of rows){
    if(r.pnlPct<=-sl)signals.push({type:'stop_loss',msg:`${r.symbol} ${r.pnlPct.toFixed(1)}% (SL:${sl}%)`});
    if(r.pnlPct>=tp)signals.push({type:'take_profit',msg:`${r.symbol} +${r.pnlPct.toFixed(1)}% (TP:${tp}%)`});
  }

  const f=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const p=n=>n.toFixed(2)+'%';

  document.getElementById('summary').innerHTML=`
    <div class="card"><div class="card-label">Portfolio Value</div><div class="card-value">$${f(totalVal)}</div></div>
    <div class="card"><div class="card-label">Total P&amp;L</div><div class="card-value ${totalPnl>=0?'pos':'neg'}">$${f(totalPnl)}</div><div class="card-sub ${totalPnl>=0?'pos':'neg'}">${p(totalPnlPct)}</div></div>
    <div class="card"><div class="card-label">Concentration (HHI)</div><div class="card-value">${hhi.toFixed(0)}</div><div class="card-sub">${hhi>2500?'⚠ High':'✓ Healthy'}</div></div>
    <div class="card"><div class="card-label">Positions</div><div class="card-value">${holdings.length}</div><div class="card-sub">${Object.keys(sectors).length} sectors</div></div>
    <div class="card"><div class="card-label">Risk</div><div class="card-value">${risk?.risk_level||'?'}</div><div class="card-sub">DD≤${(risk?.max_drawdown||0)*100}%</div></div>
  `;

  document.getElementById('holdings').innerHTML=`<h2>Holdings</h2><table><thead><tr><th>Sym</th><th>Name</th><th>Qty</th><th>Cost</th><th>Price</th><th>Value</th><th>P&amp;L</th><th>P&amp;L%</th><th>W%</th><th>Sector</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td><b>${r.symbol}</b></td><td>${r.name||r.symbol}</td><td>${r.qty}</td><td>${f(r.costBasis)}</td><td>${f(r.price)}</td><td>$${f(r.curVal)}</td><td class="${r.pnl>=0?'pos':'neg'}">$${f(r.pnl)}</td><td class="${r.pnl>=0?'pos':'neg'}">${p(r.pnlPct)}</td><td>${p(r.weight)}</td><td>${r.sector}</td></tr>`).join('')}
  </tbody></table>`;

  const sDiv=document.getElementById('sectors');sDiv.style.display='block';
  const secs=Object.entries(sectors).sort((a,b)=>b[1]-a[1]);let si=0;
  sDiv.innerHTML='<h2>Sector Allocation</h2>'+secs.map(([s,v])=>{
    const pct=totalVal>0?(v/totalVal)*100:0;
    return `<div class="bar-wrap"><span class="bar-label">${s}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${COLORS[si++%COLORS.length]}"></div></div><span class="bar-pct">${p(pct)}</span></div>`;
  }).join('');

  if(signals.length){
    const sigDiv=document.getElementById('signals');sigDiv.style.display='block';
    sigDiv.innerHTML=`<h2>Signals</h2>${signals.map(s=>`<div class="signal">${s.type==='stop_loss'?'🔴':'🟢'} ${s.msg}</div>`).join('')}`;
  }
}

// Auto-fill from URL hash
(function(){
  const h=window.location.hash.slice(1);if(!h)return;
  const p=new URLSearchParams(h);
  const t=p.get('token'),g=p.get('gateway');
  if(t)document.getElementById('gwToken').value=t;
  if(g)document.getElementById('gwUrl').value=g;
})();
</script>
</body>
</html>
