<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>UOMP Portfolio</title><link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root{--bg:#0A0A0A;--card:#111;--border:#1F2937;--txt:#E5E7EB;--mid:#9CA3AF;--dim:#6B7280;--grn:#34D399;--red:#F87171;--blu:#3B82F6;--pur:#8B5CF6;--db:#0061FF}*{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5}
  .container{max-width:1000px;margin:0 auto;padding:2rem 1.5rem}
  .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;gap:1.5rem}
  .hero h1{font-size:2.5rem;color:#fff}.hero p{color:var(--mid);max-width:500px}
  .btn{padding:.75rem 2rem;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;border:none;color:#fff}.btn:hover{opacity:.9}.btn-bl{background:var(--blu)}.btn-db{background:var(--db)}.btn-pur{background:var(--pur)}.btn-out{background:var(--card);border:1px solid var(--border);color:var(--mid)}
  .topbar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;padding:.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:.85rem;flex-wrap:wrap}.topbar .addr{color:var(--pur);font-family:monospace;font-size:.8rem}
  .status{font-size:.8rem;padding:.2rem .5rem;border-radius:4px;display:inline-block}.status-ok{background:#064E3B;color:var(--grn)}.status-warn{background:#78350F;color:#FBBF24}.status-err{background:#7F1D1D;color:var(--red)}
  .toolbar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}.spacer{flex:1}
  h2{font-size:1.1rem;margin:2rem 0 1rem;color:#fff}
  table{width:100%;border-collapse:collapse;font-size:.83rem}th,td{padding:.45rem .5rem;text-align:right;border-bottom:1px solid var(--border)}th{background:var(--card);color:var(--mid);font-weight:600}td input,td select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);padding:.3rem;border-radius:4px;font-size:.83rem}td select{cursor:pointer}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin:1.5rem 0}.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem}.card-label{font-size:.8rem;color:var(--mid);margin-bottom:.2rem}.card-value{font-size:1.2rem;font-weight:700}
  .report-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:.5rem;font-size:.83rem}.report-card .date{color:var(--dim);font-size:.75rem}.report-card pre{margin-top:.5rem;white-space:pre-wrap;color:var(--mid);max-height:200px;overflow:auto}
  .empty{text-align:center;color:var(--dim);padding:2rem 1rem}.footer{margin-top:3rem;padding-top:1rem;border-top:1px solid var(--border);color:var(--dim);font-size:.75rem;text-align:center}
  @media(max-width:640px){.container{padding:1rem}.hero h1{font-size:1.8rem}}
</style></head>
<body><div class="container">

<div id="landing">
  <div class="hero">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <h1>Your Portfolio.<br>Your Data.</h1>
    <p>Connect Dropbox and your wallet. Everything encrypted.</p>
    <button class="btn btn-bl" onclick="start()">Get Started</button>
    <div id="status" style="margin-top:.5rem"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar" id="topbar"></div>
  <div class="toolbar">
    <button class="btn btn-out" onclick="addRow()">+ Add Stock</button>
    <button class="btn btn-out" onclick="document.getElementById('csvFile').click()">📄 Import CSV</button>
    <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleCSV(event)">
    <span class="spacer"></span>
    <span id="saveStatus" style="font-size:.75rem;color:var(--dim)"></span>
    <button class="btn btn-bl" id="saveBtn" onclick="save()" style="display:none">💾 Save</button>
  </div>

  <div style="display:flex;gap:1rem;margin-bottom:1.5rem" id="steps">
    <div class="card" style="flex:1"><div class="card-label">📦 Dropbox</div><button class="btn btn-db" id="dbBtn" onclick="linkDropbox()">Connect</button><span id="dbStep"></span></div>
    <div class="card" style="flex:1"><div class="card-label">🔑 Wallet</div><button class="btn btn-pur" id="walBtn" onclick="connect('ethereum')">Connect MetaMask</button><span id="walStep"></span></div>
    <div class="card" style="flex:1"><div class="card-label">🤖 Agent</div><span id="agentStep"></span></div>
  </div>

  <h2>📊 Holdings</h2>
  <div style="overflow-x:auto"><table><thead><tr><th>Sym</th><th>Name</th><th>Qty</th><th>Cost</th><th>Sector</th><th>Value</th><th></th></tr></thead><tbody id="tbody"></tbody></table></div>
  <div class="grid" id="summaryGrid"></div>
  <h2>📝 Reports</h2>
  <div id="reports"><div class="empty">Connect Dropbox + Wallet above, then edit and save.</div></div>
</div>
<div class="footer">Powered by <a href="https://www.uomp.org" style="color:var(--mid)">UOMP</a> · Encrypted · You hold the keys.</div>
</div>

<script>
window._connect=null;window._linkDropbox=null;window._autoStart=null;
function start(){document.getElementById('landing').style.display='none';document.getElementById('app').style.display='block';if(window._autoStart)window._autoStart()}
function connect(c){if(window._connect)window._connect(c);else document.getElementById('walStep').innerHTML='<span class="status status-err">Loading...</span>'}
function linkDropbox(){if(window._linkDropbox)window._linkDropbox();else document.getElementById('dbStep').innerHTML='<span class="status status-err">Loading...</span>'}
</script>

<script type="module">
import { BrowserSDK, DropboxStore, connectDropbox as dbConnect, encryptData, decryptData } from './sdk.js?v=2026-07-20.6';

let cKey=null,uid=null,dropbox=null,holdings=[],reports=[],changed=false,_addr='',_chain='';
const SAMPLE=[{s:'AAPL',n:'Apple',q:'100',c:'150',sec:'Technology'},{s:'MSFT',n:'Microsoft',q:'40',c:'320',sec:'Technology'},{s:'GOOGL',n:'Alphabet',q:'30',c:'140',sec:'Technology'},{s:'NVDA',n:'NVIDIA',q:'30',c:'300',sec:'Technology'},{s:'TSLA',n:'Tesla',q:'50',c:'200',sec:'Consumer Cyclical'},{s:'AMZN',n:'Amazon',q:'25',c:'170',sec:'Consumer Cyclical'},{s:'JPM',n:'JPMorgan',q:'60',c:'155',sec:'Financial'},{s:'BAC',n:'BofA',q:'200',c:'32',sec:'Financial'},{s:'JNJ',n:'J&J',q:'40',c:'160',sec:'Healthcare'},{s:'XOM',n:'Exxon',q:'50',c:'100',sec:'Energy'}];
const SECS=['Technology','Consumer Cyclical','Financial','Healthcare','Energy','Utilities','Real Estate','Materials','Industrials','Communication','Other'];

async function connectWallet(chain){
  const s=document.getElementById('walStep');
  try{
    s.innerHTML='<span class="status status-ok">Signing...</span>';
    const r=await BrowserSDK.fromWallet(chain);
    cKey=r.key;uid=r.userId;_chain=chain;_addr=r.address;
    s.innerHTML='<span class="status status-ok">✓ Connected</span>';
    document.getElementById('walBtn').style.display='none';
    updateTopbar();
    await loadData();
    step3();
  }catch(e){s.innerHTML=`<span class="status status-err">${e.message}</span>`}
}

async function connectDb(){
  const s=document.getElementById('dbStep');
  try{
    s.innerHTML='<span class="status status-ok">Redirecting...</span>';
    dropbox=await dbConnect();
    s.innerHTML='<span class="status status-ok">✓ Connected</span>';
    document.getElementById('dbBtn').style.display='none';
    updateTopbar();
    if(cKey){await loadData();step3()}
  }catch(e){if(e.message==='Redirecting to Dropbox')return;s.innerHTML=`<span class="status status-err">${e.message}</span>`;document.getElementById('dbBtn').style.display=''}
}

function autoStart(){
  const qs=new URLSearchParams(location.search);
  if(qs.get('code')){sessionStorage.removeItem('uomp_db_code');history.replaceState({},'',location.pathname);connectDb()}
}

async function loadData(){
  try{
    if(dropbox){const raw=await dropbox.download('holdings.enc');if(raw&&cKey){const p=await decryptData(cKey,JSON.parse(raw));const d=JSON.parse(p);holdings=d.h||[];reports=d.r||[];render();return}}
    if(cKey){const local=await BrowserSDK.loadEncrypted(cKey,uid);if(local){holdings=local.h||[];reports=local.r||[];render();return}}
    holdings=SAMPLE.map(x=>({...x}));render();
  }catch(e){holdings=SAMPLE.map(x=>({...x}));render()}
}

async function save(){
  if(!cKey||!holdings.length)return;
  const obj={h:holdings,r:reports.slice(0,50)},s=document.getElementById('saveStatus');
  if(dropbox){
    s.innerHTML='<span class="status status-ok">Encrypting & uploading...</span>';
    try{const e=await encryptData(cKey,JSON.stringify(obj));await dropbox.upload('holdings.enc',JSON.stringify(e));s.innerHTML='<span class="status status-ok">✓ Saved to Dropbox</span>'}catch(e){s.innerHTML=`<span class="status status-err">${e.message}</span>`;return}
  }else{
    s.innerHTML='<span class="status status-ok">Saving...</span>';
    await BrowserSDK.saveEncrypted(cKey,uid,obj);
    s.innerHTML='<span class="status status-ok">✓ Saved</span>';
  }
  changed=false;document.getElementById('saveBtn').style.display='none';setTimeout(()=>s.innerHTML='',3000);
}
window.save=save;

async function step3(){
  const s=document.getElementById('agentStep');
  try{const r=await fetch('https://uomp-stock-analyst-mvblm.ondigitalocean.app/health');if(r.ok){s.innerHTML='<span class="status status-ok">● Online</span><br><button class="btn btn-pur" onclick="sendToAgent()" style="margin-top:.5rem">📤 Analyze Portfolio</button>'}else{s.innerHTML='<span class="status status-err">○ Offline</span>'}}catch{s.innerHTML='<span class="status status-err">○ Offline</span>'}
}

window.sendToAgent=async function(){
  if(!holdings.length)return;
  const s=document.getElementById('agentStep');s.innerHTML='<span class="status status-ok">Analyzing...</span>';
  try{
    const payload={holdings:holdings.map(h=>({key:h.s,value:{symbol:h.s,name:h.n,quantity:h.q,cost_basis:h.c,market_value:(parseFloat(h.q)*parseFloat(h.c)*1.15).toFixed(2),sector:h.sec,currency:'USD'},tags:['portfolio:holdings']})),risk:{risk_level:'moderate',max_drawdown:0.20,stop_loss_pct:15,take_profit_pct:50}};
    const r=await fetch('https://uomp-stock-analyst-mvblm.ondigitalocean.app/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const c=d.results?.markdown_zh||d.results?.markdown_en||d.results?.html||JSON.stringify(d.summary);
    reports.push({d:new Date().toISOString().slice(0,16),c,n:'stock-analyst-'+new Date().toISOString().slice(0,10)});
    changed=true;document.getElementById('saveBtn').style.display='inline-block';showReports();
    s.innerHTML='<span class="status status-ok">✓ Complete</span>';
  }catch(e){s.innerHTML=`<span class="status status-err">${e.message}</span>`}
}

function updateTopbar(){
  const a=_addr,st=dropbox?'📦 Dropbox':'💻 Browser';
  document.getElementById('topbar').innerHTML=`<span style="color:var(--mid)">${st}</span><span class="addr">${a.slice(0,12)}...${a.slice(-4)}</span><span class="spacer"></span><span class="status status-ok">Encrypted</span><button class="btn btn-out btn-sm" onclick="disconnectDb()" style="${dropbox?'':'display:none'}">Disconnect DB</button><button class="btn btn-out btn-sm" onclick="location.reload()">Lock</button>`;
}
window.disconnectDb=function(){dropbox=null;sessionStorage.removeItem('uomp_db');document.getElementById('dbBtn').style.display='';document.getElementById('dbStep').innerHTML='';updateTopbar();document.getElementById('saveStatus').innerHTML='<span class="status status-ok">Dropbox disconnected — click Connect to reconnect</span>'}

function render(){
  const f=n=>{const v=parseFloat(n);return isNaN(v)?'0':v.toFixed(2)};
  document.getElementById('tbody').innerHTML=holdings.map((h,i)=>{const q=parseFloat(h.q)||0,c=parseFloat(h.c)||0,val=q*c;return`<tr><td><input value="${h.s}" onchange="editCell(${i},'s',this.value)"></td><td><input value="${h.n||''}" onchange="editCell(${i},'n',this.value)"></td><td><input value="${h.q}" onchange="editCell(${i},'q',this.value)" type="number"></td><td><input value="${h.c}" onchange="editCell(${i},'c',this.value)" type="number"></td><td><select onchange="editCell(${i},'sec',this.value)">${SECS.map(x=>`<option value="${x}" ${h.sec===x?'selected':''}>${x}</option>`).join('')}</select></td><td style="color:var(--mid)">$${f(val)}</td><td><button class="btn btn-out btn-sm" style="color:var(--red)" onclick="delRow(${i})">×</button></td></tr>`}).join('');
  let tv=0;const secs={};for(const h of holdings){const v=(parseFloat(h.q)||0)*(parseFloat(h.c)||0);tv+=v;secs[h.sec||'Other']=(secs[h.sec||'Other']||0)+v}
  const hhi=holdings.reduce((s,h)=>{const v=(parseFloat(h.q)||0)*(parseFloat(h.c)||0);const w=tv>0?(v/tv)*100:0;return s+w*w},0);
  document.getElementById('summaryGrid').innerHTML=`<div class="card"><div class="card-label">Portfolio Value</div><div class="card-value">$${f(tv)}</div></div><div class="card"><div class="card-label">HHI</div><div class="card-value">${hhi.toFixed(0)}</div></div><div class="card"><div class="card-label">Positions</div><div class="card-value">${holdings.length}</div></div><div class="card"><div class="card-label">Sectors</div><div class="card-value">${Object.keys(secs).length}</div></div>`;
}

function showReports(){document.getElementById('reports').innerHTML=reports.map(r=>`<div class="report-card"><div class="date">${r.d||r.n}</div><pre>${(r.c||'').slice(0,2000)}</pre></div>`).join('')||'<div class="empty">No reports yet.</div>'}

window.addRow=function(){holdings.push({s:'NEW',n:'New Stock',q:'0',c:'0',sec:'Other'});changed=true;document.getElementById('saveBtn').style.display='inline-block';render()}
window.editCell=function(i,f,v){holdings[i][f]=v;changed=true;document.getElementById('saveBtn').style.display='inline-block';render()}
window.delRow=function(i){holdings.splice(i,1);changed=true;document.getElementById('saveBtn').style.display='inline-block';render()}
window.handleCSV=function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const lines=ev.target.result.split('\n').filter(l=>l.trim());if(lines.length<2)return;const h=lines[0].toLowerCase().split(',').map(x=>x.trim());const si=h.findIndex(x=>x==='symbol'||x==='sym'),ni=h.findIndex(x=>x==='name'),qi=h.findIndex(x=>x==='quantity'||x==='qty'),ci=h.findIndex(x=>x==='cost_basis'||x==='cost'),ei=h.findIndex(x=>x==='sector');if(si<0)return;const imp=[];for(let i=1;i<lines.length;i++){const c=lines[i].split(',').map(x=>x.trim());if(!c[si])continue;imp.push({s:c[si],n:ni>=0?c[ni]||c[si]:c[si],q:qi>=0?c[qi]||'0':'0',c:ci>=0?c[ci]||'0':'0',sec:ei>=0?c[ei]||'Other':'Other'})}holdings=imp;changed=true;document.getElementById('saveBtn').style.display='inline-block';render()};r.readAsText(f)}

// Init — only auto-start on actual OAuth redirect (URL has ?code=), never from sessionStorage
window._connect=connectWallet;window._linkDropbox=connectDb;window._autoStart=autoStart;
const _qs=new URLSearchParams(location.search);
if(_qs.get('code')){sessionStorage.setItem('uomp_db_code','1');autoStart()}
</script>
</body></html>
