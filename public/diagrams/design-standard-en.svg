<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="UOMP standard architecture sequence diagram">
  <defs>
    <marker id="seq-arrow-en" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#0A0A0A"/></marker>
    <marker id="seq-return-en" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#0A0A0A"/></marker>
  </defs>
  <rect x="30" y="20" width="120" height="36" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/><text x="90" y="43" text-anchor="middle" fill="#0A0A0A" font-size="12" font-family="Inter, system-ui, sans-serif">Agent</text>
  <line x1="90" y1="56" x2="90" y2="340" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="190" y="20" width="120" height="36" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/><text x="250" y="43" text-anchor="middle" fill="#0A0A0A" font-size="12" font-family="Inter, system-ui, sans-serif">uomp CLI</text>
  <line x1="250" y1="56" x2="250" y2="340" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="350" y="20" width="120" height="36" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/><text x="410" y="43" text-anchor="middle" fill="#0A0A0A" font-size="12" font-family="Inter, system-ui, sans-serif">Auth Service</text>
  <line x1="410" y1="56" x2="410" y2="340" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="510" y="20" width="120" height="36" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/><text x="570" y="43" text-anchor="middle" fill="#0A0A0A" font-size="12" font-family="Inter, system-ui, sans-serif">Memory Guard</text>
  <line x1="570" y1="56" x2="570" y2="340" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="670" y="20" width="120" height="36" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/><text x="730" y="43" text-anchor="middle" fill="#0A0A0A" font-size="12" font-family="Inter, system-ui, sans-serif">Memory Store</text>
  <line x1="730" y1="56" x2="730" y2="340" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="90" y1="80" x2="250" y2="80" stroke="#0A0A0A" stroke-width="2" marker-end="url(#seq-arrow-en)"/><text x="170" y="75" text-anchor="middle" fill="#0A0A0A" font-size="10" font-family="Inter, system-ui, sans-serif">1. uom.json</text>
  <path d="M250 110 L270 110 L270 130 L250 130" fill="none" stroke="#0A0A0A" stroke-width="2" marker-end="url(#seq-arrow-en)"/><text x="265" y="105" text-anchor="start" fill="#0A0A0A" font-size="10" font-family="Inter, system-ui, sans-serif">2. verify + authorize</text>
  <line x1="250" y1="160" x2="410" y2="160" stroke="#0A0A0A" stroke-width="2" marker-end="url(#seq-arrow-en)"/><text x="330" y="155" text-anchor="middle" fill="#0A0A0A" font-size="10" font-family="Inter, system-ui, sans-serif">3. create &amp; grant</text>
  <line x1="410" y1="200" x2="250" y2="200" stroke="#0A0A0A" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#seq-return-en)"/><text x="330" y="195" text-anchor="middle" fill="#0A0A0A" font-size="10" font-family="Inter, system-ui, sans-serif">UOM_TOKEN</text>
  <line x1="250" y1="240" x2="90" y2="240" stroke="#0A0A0A" stroke-width="2" marker-end="url(#seq-arrow-en)"/><text x="170" y="235" text-anchor="middle" fill="#0A0A0A" font-size="10" font-family="Inter, system-ui, sans-serif">4. deliver Token</text>
  <line x1="90" y1="280" x2="570" y2="280" stroke="#0A0A0A" stroke-width="2" marker-end="url(#seq-arrow-en)"/><text x="330" y="275" text-anchor="middle" fill="#0A0A0A" font-size="10" font-family="Inter, system-ui, sans-serif">5. HTTP + Authorization</text>
  <line x1="570" y1="320" x2="730" y2="320" stroke="#0A0A0A" stroke-width="2" marker-end="url(#seq-arrow-en)"/><text x="650" y="315" text-anchor="middle" fill="#0A0A0A" font-size="10" font-family="Inter, system-ui, sans-serif">6. read by scope</text>
  <line x1="730" y1="350" x2="90" y2="350" stroke="#0A0A0A" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#seq-return-en)"/><text x="410" y="345" text-anchor="middle" fill="#0A0A0A" font-size="10" font-family="Inter, system-ui, sans-serif">return filtered data</text>
</svg>