<svg viewBox="0 0 580 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Browser path">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7C3AED"/></marker>
    <marker id="g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#059669"/></marker>
  </defs>

  <text x="290" y="24" text-anchor="middle" fill="#7C3AED" font-size="13" font-family="Inter, system-ui, sans-serif" font-weight="700">Browser Path</text>
  <text x="290" y="42" text-anchor="middle" fill="#6B7280" font-size="10" font-family="Inter, system-ui, sans-serif">Zero install · Wallet-powered · Dropbox storage</text>

  <!-- Browser -->
  <rect x="20" y="65" width="140" height="52" rx="8" fill="#F3F0FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="90" y="88" text-anchor="middle" fill="#7C3AED" font-size="13" font-family="Inter, system-ui, sans-serif" font-weight="700">Browser</text>
  <text x="90" y="106" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">MetaMask / Argent X</text>

  <!-- Dropbox -->
  <rect x="20" y="140" width="140" height="40" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
  <text x="90" y="164" text-anchor="middle" fill="#059669" font-size="12" font-family="Inter, system-ui, sans-serif" font-weight="600">Dropbox</text>

  <!-- Gateway -->
  <rect x="220" y="65" width="120" height="52" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/>
  <text x="280" y="88" text-anchor="middle" fill="#0A0A0A" font-size="13" font-family="Inter, system-ui, sans-serif" font-weight="700">Gateway</text>
  <text x="280" y="106" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">CORS enabled</text>

  <!-- Guard -->
  <rect x="400" y="65" width="120" height="52" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/>
  <text x="460" y="88" text-anchor="middle" fill="#0A0A0A" font-size="13" font-family="Inter, system-ui, sans-serif" font-weight="700">Guard</text>
  <text x="460" y="106" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">scope + audit</text>

  <!-- Arrows -->
  <line x1="90" y1="117" x2="90" y2="140" stroke="#059669" stroke-width="1.5" marker-end="url(#g)"/>
  <text x="100" y="133" text-anchor="start" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">encrypt &amp; store</text>

  <line x1="160" y1="91" x2="220" y2="91" stroke="#7C3AED" stroke-width="2" marker-end="url(#a)"/>
  <text x="190" y="84" text-anchor="middle" fill="#7C3AED" font-size="9" font-family="Inter, system-ui, sans-serif">call agent</text>

  <line x1="340" y1="91" x2="400" y2="91" stroke="#7C3AED" stroke-width="2" marker-end="url(#a)"/>

  <text x="290" y="180" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">Wallet signature → encryption key (PBKDF2) → Dropbox ciphertext</text>
</svg>
