<svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="浏览器路径">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7C3AED"/></marker>
    <marker id="g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#059669"/></marker>
    <marker id="b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#0891B2"/></marker>
  </defs>

  <text x="350" y="24" text-anchor="middle" fill="#7C3AED" font-size="13" font-family="Inter, system-ui, sans-serif" font-weight="700">浏览器路径</text>
  <text x="350" y="42" text-anchor="middle" fill="#6B7280" font-size="10" font-family="Inter, system-ui, sans-serif">用户通过浏览器调用 Agent → Agent 读数据 → 返回分析报告</text>

  <!-- Browser -->
  <rect x="20" y="65" width="120" height="56" rx="8" fill="#F3F0FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="80" y="88" text-anchor="middle" fill="#7C3AED" font-size="13" font-family="Inter, system-ui, sans-serif" font-weight="700">浏览器</text>
  <text x="80" y="106" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">MetaMask / Argent X</text>

  <!-- Agent -->
  <rect x="200" y="65" width="120" height="56" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="2"/>
  <text x="260" y="85" text-anchor="middle" fill="#0891B2" font-size="12" font-family="Inter, system-ui, sans-serif" font-weight="700">Agent</text>
  <text x="260" y="103" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">Stock Analyst 等</text>

  <!-- Gateway -->
  <rect x="380" y="65" width="120" height="56" rx="8" fill="#FFFBEB" stroke="#B45309" stroke-width="2"/>
  <text x="440" y="85" text-anchor="middle" fill="#B45309" font-size="12" font-family="Inter, system-ui, sans-serif" font-weight="700">Gateway</text>
  <text x="440" y="103" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">CORS + Tunnel</text>

  <!-- Guard + Store -->
  <rect x="560" y="65" width="120" height="56" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/>
  <text x="620" y="85" text-anchor="middle" fill="#0A0A0A" font-size="12" font-family="Inter, system-ui, sans-serif" font-weight="700">Guard + Store</text>
  <text x="620" y="103" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">scope + SQLite</text>

  <!-- Dropbox -->
  <rect x="80" y="165" width="120" height="36" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
  <text x="140" y="187" text-anchor="middle" fill="#059669" font-size="12" font-family="Inter, system-ui, sans-serif" font-weight="600">Dropbox（加密）</text>

  <!-- Arrows: Browser → Agent (call) -->
  <line x1="140" y1="86" x2="200" y2="86" stroke="#7C3AED" stroke-width="2" marker-end="url(#a)"/>
  <text x="170" y="80" text-anchor="middle" fill="#7C3AED" font-size="9" font-family="Inter, system-ui, sans-serif">调用</text>

  <!-- Agent → Gateway (read data) -->
  <line x1="320" y1="86" x2="380" y2="86" stroke="#0891B2" stroke-width="2" marker-end="url(#b)"/>
  <text x="350" y="80" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">读数据</text>

  <!-- Gateway → Guard -->
  <line x1="500" y1="86" x2="560" y2="86" stroke="#B45309" stroke-width="2" marker-end="url(#a)"/>

  <!-- Guard → Agent (return) -->
  <line x1="560" y1="108" x2="320" y2="108" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#b)"/>
  <text x="440" y="122" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">过滤数据</text>

  <!-- Agent → Browser (report) -->
  <line x1="200" y1="108" x2="140" y2="108" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="170" y="122" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">分析报告</text>

  <!-- Browser → Dropbox -->
  <line x1="80" y1="121" x2="80" y2="165" stroke="#059669" stroke-width="1.5" marker-end="url(#g)"/>
  <text x="90" y="148" text-anchor="start" fill="#6B7280" font-size="8.5" font-family="Inter, system-ui, sans-serif">钱包签名 → 加密存储</text>

  <text x="350" y="210" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">用户操作浏览器 → 浏览器调用 Agent → Agent 通过 Gateway 读取 Guard → 返回报告</text>
</svg>
