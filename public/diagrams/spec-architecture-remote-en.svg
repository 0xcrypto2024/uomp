<svg viewBox="0 0 580 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Remote path">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#B45309"/></marker>
  </defs>

  <text x="290" y="24" text-anchor="middle" fill="#B45309" font-size="13" font-family="Inter, system-ui, sans-serif" font-weight="700">Remote Path</text>
  <text x="290" y="42" text-anchor="middle" fill="#6B7280" font-size="10" font-family="Inter, system-ui, sans-serif">Gateway + Cloudflare Tunnel → Remote Agent anywhere</text>

  <!-- User machine box -->
  <rect x="15" y="55" width="310" height="130" rx="10" fill="#FAFAF8" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="170" y="72" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">User's Machine</text>

  <!-- Gateway -->
  <rect x="40" y="88" width="140" height="44" rx="8" fill="#FFFBEB" stroke="#B45309" stroke-width="2"/>
  <text x="110" y="114" text-anchor="middle" fill="#B45309" font-size="13" font-family="Inter, system-ui, sans-serif" font-weight="700">Gateway</text>

  <!-- Tunnel label -->
  <text x="110" y="152" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">+ Cloudflare Tunnel</text>

  <!-- Auth -->
  <rect x="200" y="88" width="100" height="44" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="1.5"/>
  <text x="250" y="114" text-anchor="middle" fill="#0A0A0A" font-size="11" font-family="Inter, system-ui, sans-serif" font-weight="600">Auth</text>

  <!-- Cloud Relay -->
  <rect x="365" y="88" width="120" height="44" rx="8" fill="#FFFBEB" stroke="#B45309" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="425" y="108" text-anchor="middle" fill="#B45309" font-size="12" font-family="Inter, system-ui, sans-serif" font-weight="700">Cloud Relay</text>
  <text x="425" y="124" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">verify → forward</text>

  <!-- Remote Agent -->
  <rect x="525" y="88" width="120" height="44" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="585" y="108" text-anchor="middle" fill="#0891B2" font-size="12" font-family="Inter, system-ui, sans-serif" font-weight="700">Remote Agent</text>
  <text x="585" y="124" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">cloud / DO</text>

  <!-- Arrows -->
  <line x1="250" y1="88" x2="180" y2="88" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="215" y="81" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">token</text>

  <line x1="180" y1="132" x2="365" y2="110" stroke="#B45309" stroke-width="2" marker-end="url(#a)"/>
  <text x="272" y="126" text-anchor="middle" fill="#B45309" font-size="9" font-family="Inter, system-ui, sans-serif">Tunnel</text>

  <line x1="485" y1="110" x2="525" y2="110" stroke="#B45309" stroke-width="2" marker-end="url(#a)"/>
  <text x="505" y="103" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">HTTP</text>

  <text x="360" y="180" text-anchor="middle" fill="#6B7280" font-size="9" font-family="Inter, system-ui, sans-serif">Auth issues Token → Gateway exposes via Tunnel → Relay verifies → Agent reads</text>
</svg>
